<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#12382f">
    <title>Boston Birthday Weekend</title>
    <style>
:root {
  --paper: #f7f0e3;
  --paper-deep: #eadcc5;
  --ink: #17231f;
  --muted: #6e6254;
  --fenway: #12382f;
  --navy: #162b43;
  --red: #9f3c35;
  --gold: #c6a15b;
  --white: #fffaf1;
  --line: rgba(18, 56, 47, 0.22);
  --shadow: 0 18px 50px rgba(24, 29, 24, 0.12);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background:
    radial-gradient(circle at 18% 0%, rgba(198, 161, 91, 0.18), transparent 26rem),
    linear-gradient(135deg, rgba(255, 250, 241, 0.86), rgba(234, 220, 197, 0.48)),
    var(--paper);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
}

body::before {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  content: "";
  opacity: 0.35;
  background-image:
    linear-gradient(rgba(18, 56, 47, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(18, 56, 47, 0.028) 1px, transparent 1px);
  background-size: 28px 28px;
}

a {
  color: inherit;
}

.skip-link {
  position: absolute;
  left: 1rem;
  top: 1rem;
  z-index: 20;
  transform: translateY(-160%);
  padding: 0.7rem 1rem;
  border-radius: 999px;
  background: var(--fenway);
  color: var(--white);
  text-decoration: none;
}

.skip-link:focus {
  transform: translateY(0);
}

.loading-screen {
  position: fixed;
  inset: 0;
  z-index: 30;
  display: grid;
  place-items: center;
  background: var(--fenway);
  color: var(--white);
  transition: opacity 0.55s ease, visibility 0.55s ease;
}

.loaded .loading-screen {
  visibility: hidden;
  opacity: 0;
}

.loading-mark {
  display: grid;
  gap: 0.6rem;
  text-align: center;
}

.loading-kicker,
.eyebrow {
  color: var(--red);
  font-size: 0.74rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.loading-title {
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(2rem, 9vw, 4.8rem);
}

.site-header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  padding: 0.75rem max(1rem, calc((100vw - 1040px) / 2));
  border-bottom: 1px solid rgba(18, 56, 47, 0.12);
  background: rgba(247, 240, 227, 0.86);
  backdrop-filter: blur(18px);
}

.brand-link {
  display: grid;
  flex: 0 0 auto;
  width: 2.65rem;
  height: 2.65rem;
  place-items: center;
  border: 1px solid var(--line);
  border-radius: 50%;
  background: var(--fenway);
  color: var(--white);
  font-family: Georgia, "Times New Roman", serif;
  font-size: 0.82rem;
  text-decoration: none;
}

.view-nav {
  display: inline-flex;
  gap: 0.35rem;
  padding: 0.25rem;
  border: 1px solid rgba(18, 56, 47, 0.14);
  border-radius: 999px;
  background: rgba(255, 250, 241, 0.72);
}

.view-button {
  min-height: 2.25rem;
  padding: 0 0.82rem;
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: var(--fenway);
  cursor: pointer;
  font: inherit;
  font-size: 0.86rem;
  font-weight: 900;
}

.view-button.is-active {
  background: var(--fenway);
  color: var(--white);
}

.weather-strip::-webkit-scrollbar {
  display: none;
}

.map-link {
  min-height: 2.65rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(18, 56, 47, 0.18);
  border-radius: 999px;
  background: rgba(255, 250, 241, 0.72);
  color: var(--fenway);
  font-size: 0.9rem;
  font-weight: 800;
  text-decoration: none;
  white-space: nowrap;
}

main {
  max-width: 1040px;
  margin: 0 auto;
}

.hero {
  position: relative;
  min-height: auto;
  display: grid;
  align-items: center;
  gap: 1.2rem;
  padding: 1.4rem 1rem 0.6rem;
}

.photo-backdrop {
  position: absolute;
  inset: 0.35rem 0.7rem auto;
  height: 16rem;
  pointer-events: none;
}

.memory-photo {
  position: absolute;
  display: grid;
  place-items: center;
  overflow: hidden;
  width: 6.8rem;
  height: 5rem;
  border: 1px solid rgba(18, 56, 47, 0.16);
  border-radius: 0.45rem;
  background:
    linear-gradient(145deg, rgba(255, 250, 241, 0.82), rgba(234, 220, 197, 0.72)),
    repeating-linear-gradient(45deg, rgba(18, 56, 47, 0.05) 0 8px, rgba(198, 161, 91, 0.08) 8px 16px);
  box-shadow: 0 12px 30px rgba(24, 29, 24, 0.09);
  color: rgba(18, 56, 47, 0.62);
  font-family: Georgia, "Times New Roman", serif;
  font-size: 0.9rem;
  opacity: 0.42;
}

.memory-photo::before {
  position: absolute;
  inset: 0.35rem;
  content: "";
  border: 1px solid rgba(255, 250, 241, 0.82);
  border-radius: 0.28rem;
}

.memory-photo-1 {
  left: 1%;
  top: 0.2rem;
  transform: rotate(-7deg);
}

.memory-photo-2 {
  right: 4%;
  top: 0.4rem;
  transform: rotate(5deg);
}

.memory-photo-3 {
  left: 12%;
  top: 8.6rem;
  transform: rotate(4deg);
}

.memory-photo-4 {
  right: 19%;
  top: 7.7rem;
  transform: rotate(-4deg);
}

.memory-photo-5 {
  left: 46%;
  top: 3.9rem;
  transform: rotate(2deg);
}

.hero-art {
  order: 2;
  min-height: 11rem;
  min-width: 0;
}

.postcard {
  position: relative;
  overflow: hidden;
  min-height: 11rem;
  border: 1px solid rgba(18, 56, 47, 0.2);
  border-radius: 0.5rem;
  background:
    linear-gradient(155deg, rgba(18, 56, 47, 0.92), rgba(22, 43, 67, 0.9)),
    var(--fenway);
  box-shadow: var(--shadow);
}

.postcard::before {
  position: absolute;
  inset: 1rem;
  content: "";
  border: 1px solid rgba(247, 240, 227, 0.34);
}

.postcard::after {
  position: absolute;
  right: -2.4rem;
  bottom: -3.5rem;
  width: 12rem;
  height: 12rem;
  content: "";
  border: 1.1rem solid rgba(198, 161, 91, 0.32);
  border-radius: 50%;
}

.postcard-line {
  position: absolute;
  left: 1.4rem;
  right: 1.4rem;
  height: 0.35rem;
  border-radius: 999px;
  background: rgba(247, 240, 227, 0.22);
}

.line-one {
  top: 34%;
}

.line-two {
  top: 48%;
  width: 62%;
}

.diamond {
  position: absolute;
  width: 1.2rem;
  height: 1.2rem;
  transform: rotate(45deg);
  border: 1px solid rgba(247, 240, 227, 0.45);
}

.diamond-one {
  left: 9%;
  bottom: 17%;
}

.diamond-two {
  left: 17%;
  bottom: 30%;
}

.scoreboard {
  position: absolute;
  right: 1.6rem;
  top: 1.35rem;
  color: var(--gold);
  font-family: Georgia, "Times New Roman", serif;
  font-size: 3.6rem;
}

.hero-copy {
  position: relative;
  z-index: 2;
  display: grid;
  gap: 0.75rem;
}

.hero-art {
  position: relative;
  z-index: 1;
}

.hero h1,
.section-heading h2,
.day-heading h3 {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  line-height: 0.98;
  font-weight: 500;
}

.hero h1 {
  max-width: 9ch;
  color: var(--fenway);
  font-size: clamp(4rem, 18vw, 8.6rem);
}

.hero-subtitle {
  max-width: 34rem;
  margin: 0;
  color: var(--navy);
  font-size: clamp(1.15rem, 4vw, 1.8rem);
  font-weight: 700;
}

.weather-section,
.flights-section,
.itinerary-section {
  padding: 1rem;
}

.view-panel {
  display: none;
}

.view-panel.is-active {
  display: block;
}

.section-heading {
  margin: 1.2rem 0 0.75rem;
}

.section-heading h2 {
  color: var(--fenway);
  font-size: clamp(2.35rem, 10vw, 4.6rem);
}

.weather-note {
  max-width: 38rem;
  margin: -0.2rem 0 0.75rem;
  color: var(--muted);
  font-size: 0.96rem;
}

.compact-heading {
  margin-top: 1.1rem;
}

.flight-board {
  display: grid;
  gap: 0.85rem;
}

.flight-group {
  display: grid;
  gap: 0.65rem;
  padding: 0.9rem;
  border: 1px solid rgba(18, 56, 47, 0.14);
  border-radius: 0.5rem;
  background: rgba(255, 250, 241, 0.58);
}

.flight-group h3 {
  margin: 0;
  color: var(--fenway);
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.7rem;
  font-weight: 500;
  line-height: 1;
}

.flight-list {
  display: grid;
  gap: 0.65rem;
}

.flight-card {
  display: grid;
  gap: 0.55rem;
  padding: 0.85rem;
  border: 1px solid rgba(18, 56, 47, 0.12);
  border-radius: 0.5rem;
  background: rgba(255, 250, 241, 0.78);
}

.flight-person {
  width: fit-content;
  padding: 0.24rem 0.62rem;
  border-radius: 999px;
  background: rgba(198, 161, 91, 0.18);
  color: var(--fenway);
  font-size: 0.78rem;
  font-weight: 900;
}

.flight-route {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 0.65rem;
  color: var(--navy);
}

.flight-route strong {
  min-width: 0;
  font-size: 1rem;
}

.flight-route strong:last-child {
  text-align: right;
}

.flight-route span {
  padding: 0.22rem 0.5rem;
  border: 1px solid rgba(18, 56, 47, 0.16);
  border-radius: 999px;
  color: var(--red);
  font-size: 0.78rem;
  font-weight: 900;
  white-space: nowrap;
}

.flight-times {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}

.flight-times p {
  margin: 0;
  color: var(--ink);
  font-size: 0.92rem;
  font-weight: 800;
}

.flight-times span {
  display: block;
  color: var(--muted);
  font-size: 0.74rem;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.weather-strip {
  display: grid;
  grid-template-columns: repeat(4, minmax(9.5rem, 1fr));
  gap: 0.7rem;
  overflow-x: auto;
  padding-bottom: 0.25rem;
  scrollbar-width: none;
}

.weather-card,
.event-card {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}

.weather-card.is-visible,
.day-section.is-visible .event-card,
.day-section.is-visible {
  opacity: 1;
  transform: translateY(0);
}

.weather-card {
  display: grid;
  gap: 0.65rem;
  min-height: 7.2rem;
  padding: 0.85rem;
  border: 1px solid rgba(18, 56, 47, 0.14);
  border-radius: 0.5rem;
  background: rgba(255, 250, 241, 0.66);
}

.weather-card-head,
.rain-times p {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 0.5rem;
}

.weather-card span,
.rain-times p {
  color: var(--muted);
}

.weather-card-head span {
  font-size: 0.82rem;
  font-weight: 900;
}

.weather-card strong {
  color: var(--navy);
  font-size: 1.15rem;
}

.rain-times {
  display: grid;
  gap: 0.2rem;
}

.rain-times p {
  margin: 0;
  font-size: 0.82rem;
}

.rain-times b {
  color: var(--fenway);
  font-weight: 900;
}

.timeline {
  position: relative;
  display: grid;
  gap: 1.35rem;
}

.timeline::before {
  position: absolute;
  top: 1.4rem;
  bottom: 1.4rem;
  left: 0.72rem;
  width: 1px;
  content: "";
  background: linear-gradient(var(--line), rgba(159, 60, 53, 0.32), var(--line));
}

.day-section {
  position: relative;
  display: grid;
  gap: 0.9rem;
  padding: 1rem 0 0 2rem;
  border-top: 1px solid rgba(18, 56, 47, 0.16);
}

.day-section:first-child {
  border-top: 0;
  padding-top: 0;
}

.day-marker {
  position: absolute;
  left: 0.28rem;
  top: 1.95rem;
  width: 1rem;
  height: 1rem;
  border: 2px solid var(--paper);
  border-radius: 50%;
  background: var(--fenway);
  box-shadow: 0 0 0 1px var(--line);
}

.day-section:first-child .day-marker {
  top: 0.95rem;
}

.featured-day .day-marker {
  background: var(--red);
  box-shadow: 0 0 0 5px rgba(159, 60, 53, 0.12);
}

.day-heading {
  display: grid;
  gap: 0.25rem;
  padding: 0.85rem 1rem;
  border: 1px solid rgba(18, 56, 47, 0.12);
  border-left: 0.35rem solid var(--gold);
  border-radius: 0.5rem;
  background: rgba(255, 250, 241, 0.56);
}

.featured-day .day-heading {
  border-left-color: var(--red);
  background: rgba(159, 60, 53, 0.055);
}

.day-heading p,
.event-detail,
.event-location {
  margin: 0;
  color: var(--muted);
}

.day-heading h3 {
  color: var(--navy);
  font-size: clamp(2rem, 8vw, 3.7rem);
}

.day-heading span {
  width: fit-content;
  margin-top: 0.25rem;
  padding: 0.28rem 0.62rem;
  border: 1px solid rgba(159, 60, 53, 0.2);
  border-radius: 999px;
  background: rgba(159, 60, 53, 0.08);
  color: var(--red);
  font-size: 0.78rem;
  font-weight: 800;
}

.event-list {
  display: grid;
  gap: 0.75rem;
}

.event-card {
  display: grid;
  grid-template-columns: minmax(4.8rem, 6rem) 1fr;
  gap: 0.8rem;
  padding: 1rem;
  border: 1px solid rgba(18, 56, 47, 0.14);
  border-radius: 0.5rem;
  background: rgba(255, 250, 241, 0.78);
  box-shadow: 0 10px 30px rgba(23, 35, 31, 0.07);
}

.event-card.open-time {
  background: rgba(255, 250, 241, 0.54);
  border-style: dashed;
}

.event-time {
  color: var(--red);
  font-size: 1.02rem;
  font-weight: 900;
  line-height: 1.16;
}

.event-main {
  display: grid;
  gap: 0.45rem;
  min-width: 0;
}

.event-title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.5rem;
}

.event-title-row h4 {
  margin: 0;
  color: var(--fenway);
  font-size: 1.16rem;
  line-height: 1.2;
}

.status-pill {
  flex: 0 0 auto;
  padding: 0.22rem 0.52rem;
  border-radius: 999px;
  background: rgba(198, 161, 91, 0.18);
  color: #73572a;
  font-size: 0.72rem;
  font-weight: 800;
}

.event-location {
  font-weight: 700;
}

.map-link {
  width: fit-content;
  padding: 0 1rem;
  background: var(--white);
}

.site-footer {
  max-width: 1040px;
  margin: 0 auto;
  padding: 2rem 1rem 3rem;
  color: var(--muted);
}

@media (min-width: 760px) {
  .hero {
    grid-template-columns: minmax(0, 1.12fr) minmax(16rem, 0.88fr);
    padding: 2.2rem 1.25rem 1rem;
  }

  .photo-backdrop {
    inset: 0.55rem 1.25rem auto;
    height: 20rem;
  }

  .memory-photo {
    width: 8.6rem;
    height: 6.3rem;
  }

  .hero-art {
    order: initial;
  }

  .postcard {
    min-height: 15rem;
  }

  .weather-strip {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    overflow: visible;
  }

  .flight-board {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    align-items: start;
  }

  .day-section {
    grid-template-columns: 18rem 1fr;
    gap: 1.25rem;
    padding-left: 2.4rem;
  }

  .timeline::before {
    left: 0.92rem;
  }

  .day-marker {
    left: 0.47rem;
    top: 2rem;
  }

  .day-section:first-child .day-marker {
    top: 1rem;
  }
}

@media (max-width: 860px) {
  .hero {
    grid-template-columns: 1fr;
  }

  .hero-art {
    order: 2;
  }

  .postcard {
    min-height: 10rem;
  }
}

@media (max-width: 420px) {
  .event-card {
    grid-template-columns: 1fr;
  }

  .event-time {
    font-size: 1.2rem;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
}
    </style>
  </head>
  <body>
    <div class="loading-screen" id="loadingScreen" aria-hidden="true">
      <div class="loading-mark">
        <span class="loading-kicker">May 22-25, 2026</span>
        <span class="loading-title">Boston Birthday Weekend</span>
      </div>

    <a class="skip-link" href="#itinerary">Skip to itinerary</a>

    <header class="site-header" aria-label="Weekend header">
      <a class="brand-link" href="#top" aria-label="Boston Birthday Weekend home">BBW</a>
      <nav class="view-nav" aria-label="Page view">
        <button class="view-button is-active" type="button" data-view-target="itineraryView">Itinerary</button>
        <button class="view-button" type="button" data-view-target="flightsView">Flights</button>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="heroTitle">
        <div class="photo-backdrop" id="photoBackdrop" aria-hidden="true"></div>
        <div class="hero-copy">
          <h1 id="heroTitle"></h1>
          <p class="hero-subtitle" id="heroSubtitle"></p>

        <div class="hero-art" aria-hidden="true">
          <div class="postcard">
            <span class="postcard-line line-one"></span>
            <span class="postcard-line line-two"></span>
            <span class="diamond diamond-one"></span>
            <span class="diamond diamond-two"></span>
            <span class="scoreboard">60</span>

      </section>

      <div class="view-panel is-active" id="itineraryView">
        <section class="weather-section" aria-labelledby="weatherTitle">

          </div>
          <p class="weather-note" id="weatherNote"></p>
          <div class="weather-strip" id="weatherStrip"></div>

        <section class="itinerary-section" id="itinerary" aria-labelledby="itineraryTitle">
          <div class="section-heading">
            <p class="eyebrow">Chapter by Chapter</p>

          <div class="timeline" id="timeline"></div>

      <section class="view-panel flights-section" id="flightsView" aria-labelledby="flightsTitle">
        <div class="section-heading compact-heading">
          <p class="eyebrow">Flights</p>
          <h2 id="flightsTitle">Arrivals & Departures</h2>
        </div>
        <div class="flight-board" id="flightBoard"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p id="footerText"></p>
    </footer>

    <script>

    <script>
(function () {
  const data = window.__APP_DATA__;
  const $ = (selector) => document.querySelector(selector);

  const mapButton = (event) => {
    if (!event.mapUrl) return "";
    return `<a class="map-link" href="${event.mapUrl}" target="_blank" rel="noreferrer">Open in Maps</a>`;
  };

  const renderHeader = () => {
    $("#heroTitle").textContent = data.site.title;
    $("#heroSubtitle").innerHTML = data.site.subtitle;
    $("#footerText").textContent = data.site.footer;
  };

  const renderPhotoBackdrop = () => {
    $("#photoBackdrop").innerHTML = data.memoryPhotos.map((photo, index) => `
      <div class="memory-photo memory-photo-${index + 1}">
        <span>${photo.label}</span>
      </div>
    `).join("");
  };

  const renderFlights = () => {
    const groups = [
      { key: "arrival", title: "Arrivals" },
      { key: "departure", title: "Departures" }
    ];

    $("#flightBoard").innerHTML = groups.map((group) => {
      const flights = data.flights.filter((flight) => flight.type === group.key);
      return `
        <section class="flight-group" aria-label="${group.title}">
          <h3>${group.title}</h3>
          <div class="flight-list">
            ${flights.map((flight) => `
              <article class="flight-card">
                <div class="flight-person">${flight.person}</div>
                <div class="flight-route">
                  <strong>${flight.from}</strong>
                  <span>${flight.flightNumber}</span>
                  <strong>${flight.to}</strong>
                </div>
                <div class="flight-times">
                  <p><span>Depart</span>${flight.depart}</p>
                  <p><span>Arrive</span>${flight.arrive}</p>
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      `;
    }).join("");
  };

  const renderWeather = () => {
    $("#weatherNote").textContent = data.site.weatherNote;
    $("#weatherStrip").innerHTML = data.weather.map((day) => `
      <article class="weather-card">
        <div class="weather-card-head">
          <span>${day.label}</span>
          <strong>${day.high}/${day.low}</strong>
        </div>
        <div class="rain-times">
          ${day.periods.map((period) => `
            <p><span>${period.label}</span><b>${period.rain}</b></p>
          `).join("")}
        </div>
      </article>
    `).join("");
  };

  const renderTimeline = () => {
    $("#timeline").innerHTML = data.itinerary.map((day) => `
      <section class="day-section ${day.featured ? "featured-day" : ""}" id="${day.id}" aria-labelledby="${day.id}-title">
        <div class="day-marker" aria-hidden="true"></div>
        <div class="day-heading">
          <p>${day.date}</p>
          <h3 id="${day.id}-title">${day.title}</h3>
          ${day.badge ? `<span>${day.badge}</span>` : ""}
        </div>
        <div class="event-list">
          ${day.events.map((event) => `
            <article class="event-card ${event.status === "open" ? "open-time" : ""}">
              <div class="event-time">${event.time}</div>
              <div class="event-main">
                <div class="event-title-row">
                  <h4>${event.name}</h4>
                  ${event.status === "open" ? `<span class="status-pill">Open time</span>` : ""}
                </div>
                <p class="event-location">${event.location}</p>
                ${event.detail ? `<p class="event-detail">${event.detail}</p>` : ""}
                ${mapButton(event)}
              </div>
            </article>
          `).join("")}
        </div>
      </section>
    `).join("");
  };

  const setupViewSwitching = () => {
    const buttons = document.querySelectorAll("[data-view-target]");
    const panels = document.querySelectorAll(".view-panel");

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        const targetId = button.dataset.viewTarget;

        buttons.forEach((item) => {
          item.classList.toggle("is-active", item === button);
        });

        panels.forEach((panel) => {
          panel.classList.toggle("is-active", panel.id === targetId);
        });
      });
    });
  };

  const revealOnScroll = () => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add("is-visible");
      });
    }, { threshold: 0.14 });
    document.querySelectorAll(".weather-card, .day-section").forEach((element) => {
      observer.observe(element);
    });
  };

  const init = () => {
    renderHeader();
    renderPhotoBackdrop();
    renderFlights();
    renderWeather();
    renderTimeline();
    setupViewSwitching();
    revealOnScroll();
    setTimeout(() => document.body.classList.add("loaded"), 650);
  };

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
    </script>
